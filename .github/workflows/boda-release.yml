name: Boda release package
run-name: Boda package /new by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: boda-package
  cancel-in-progress: false

jobs:
  package:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BODA_PATH_PREFIX: /new
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.164.0"
          extended: true
      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
      - name: Build Boda release
        run: ./tools/build_boda_release.sh
      - name: Install Boda client
        run: python3 -m pip install -r boda_release/requirements.txt
      - name: Verify release plan
        run: ./tools/bodacli plan dist/boda-site
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: boda-site-${{ github.sha }}
          path: dist/boda-site
          if-no-files-found: error
          retention-days: 3
