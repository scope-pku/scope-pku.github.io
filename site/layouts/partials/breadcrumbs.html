<nav class="breadcrumbs" aria-label="{{ i18n "breadcrumbs" }}">
  <ol>
    <li><a href="{{ site.Home.RelPermalink }}">{{ i18n "home" }}</a></li>
    {{ with .CurrentSection }}
      {{ if ne .RelPermalink $.RelPermalink }}<li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>{{ end }}
    {{ end }}
    <li aria-current="page">{{ .Title }}</li>
  </ol>
</nav>
