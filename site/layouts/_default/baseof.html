<!doctype html>
<html lang="{{ site.Language.Locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.Params.description }}">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
    <link rel="canonical" href="{{ .Permalink }}">
    {{ range .AllTranslations }}
      <link rel="alternate" hreflang="{{ .Language.Locale }}" href="{{ .Permalink }}">
    {{ end }}
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}?v=2">
  </head>
  <body>
    <a class="skip-link" href="#main">{{ if eq site.Language.Lang "zh" }}跳到正文{{ else }}Skip to content{{ end }}</a>
    {{ partial "header.html" . }}
    <main id="main" class="container">
      {{ if not .IsHome }}{{ partial "breadcrumbs.html" . }}{{ end }}
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
