{{ define "main" }}
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    <div class="prose">{{ .Content }}</div>
  </header>
  {{ with .Pages }}
    <div class="index-list">
      {{ range .ByWeight }}
        <article class="index-entry">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          {{ with .Summary }}<p>{{ . }}</p>{{ end }}
        </article>
      {{ end }}
    </div>
  {{ end }}
{{ end }}
