{{ define "main" }}
  <article class="not-found-page">
    <header class="page-header">
      <p class="eyebrow">404</p>
      <h1>{{ i18n "page_not_found" }}</h1>
      <p>{{ i18n "not_found_message" }}</p>
      {{ if ne .Language.Lang "zh" }}<p lang="zh-CN">您访问的页面不存在或已经移动。<a href="/zh/">返回中文首页</a></p>{{ end }}
    </header>
    <p><a href="{{ site.Home.RelPermalink }}">{{ i18n "return_home" }}</a></p>
  </article>
{{ end }}
