{{ define "main" }}
  <article class="teaching-page">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Summary }}<p>{{ . }}</p>{{ end }}
    </header>
    <section class="teaching-overview">
      {{ with .Params.featureImage }}
        <figure>
          <img src="{{ . }}" width="{{ $.Params.featureImageWidth }}" height="{{ $.Params.featureImageHeight }}" alt="{{ $.Params.featureImageAlt }}">
        </figure>
      {{ end }}
      <div class="teaching-overview__content prose">{{ .Content }}</div>
    </section>
    {{ if .Pages }}
      <nav class="teaching-year-nav" aria-label="{{ i18n "teaching_years" }}">
        <p>{{ i18n "browse_annual_records" }}</p>
        <div>
          {{ range .Pages.ByWeight }}<a href="{{ .RelPermalink }}">{{ index (findRE `[0-9]{4}` .Title) 0 }}</a>{{ end }}
        </div>
      </nav>
    {{ end }}
  </article>
{{ end }}
