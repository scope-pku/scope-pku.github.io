{{ $record := index (where hugo.Data.highlights "image" (.Get "image")) 0 }}
<article class="research-highlight">
  <figure>
    <img src="{{ .Get "image" }}" width="{{ $record.width }}" height="{{ $record.height }}" alt="{{ .Get "title" }}" loading="lazy" decoding="async">
  </figure>
  <div>
    <h2>{{ .Get "title" }}</h2>
    <div class="research-highlight__content">{{ .Inner | markdownify }}</div>
  </div>
</article>
