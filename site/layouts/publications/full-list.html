{{ define "main" }}
  {{ $content := .Content }}
  {{ if not $content }}
    {{ range .Translations }}
      {{ if eq .Language.Lang "en" }}
        {{ $content = .Content }}
      {{ end }}
    {{ end }}
  {{ end }}
  <article class="publication-list-page">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      <p>{{ .Summary }}</p>
    </header>
    <div class="publication-list">
      {{ $content }}
    </div>
  </article>
{{ end }}
